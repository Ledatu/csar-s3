listen_addr: ":8087"
health_addr: "127.0.0.1:9088"
shutdown_timeout: "30s"

tls:
  cert_file: "/etc/csar/tls/s3-server.pem"
  key_file: "/etc/csar/tls/s3-server-key.pem"
  client_ca_file: "/etc/csar/tls/ca.pem"
  min_version: "1.3"

scopes:
  authn-avatars:
    bucket: "example-profile-bucket"
    endpoint: "https://storage.yandexcloud.net"
    region: "ru-central1"
    key_prefix: "profiles/avatars"
    use_path_style: true
    max_upload_bytes: 10485760
    allowed_content_types:
      - "image/gif"
      - "image/jpeg"
      - "image/png"
      - "image/webp"
    default_intent_ttl: "15m"
    max_intent_ttl: "1h"
    default_read_link_ttl: "15m"
    max_read_link_ttl: "15m"
    auth:
      auth_mode: "static"
      access_key_id: "${CSAR_S3_AUTHN_AVATARS_ACCESS_KEY_ID}"
      secret_access_key: "${CSAR_S3_AUTHN_AVATARS_SECRET_ACCESS_KEY}"
